<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Stranger Things — El Portal de la Isla</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --ac-bg: #f8f5e4;
            --ac-brown: #8b5a2b;
            --ac-yellow: #ffcc00;
            --st-red: #ff0000;
            --st-dark: #0a0a0a;
            --font-8bit: 'Press Start 2P', cursive;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; min-height: 100dvh;
            background-color: var(--ac-bg);
            background-image: radial-gradient(#e1dec9 2px, transparent 2px);
            background-size: 24px 24px;
            font-family: ui-rounded, sans-serif;
            color: #4b4b4b;
            display: flex; justify-content: center;
            transition: background 5s ease, color 5s ease;
            overflow-x: hidden;
        }

        /* --- ESTILOS STRANGER THINGS --- */
        body.upside-down {
            background-color: var(--st-dark) !important;
            background-image: radial-gradient(circle at 50% 50%, #250000 0%, #000 100%) !important;
            color: var(--st-red) !important;
        }

        .app { width: 100%; max-width: 26rem; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; position: relative; }

        .stats-row { display: flex; justify-content: space-between; z-index: 10; }
        .stat-pill {
            background: #fffef0; border: 3px solid var(--ac-brown);
            border-radius: 999px; padding: 0.5rem 1rem; font-weight: 800;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
            transition: all 5s ease;
        }

        body.upside-down .stat-pill {
            background: #1a0000; border-color: var(--st-red); color: var(--st-red);
            font-family: var(--font-8bit); font-size: 0.5rem; box-shadow: 0 0 10px var(--st-red);
        }

        /* Fases */
        .phase { display: none; flex-direction: column; flex: 1; gap: 1rem; }
        .phase.is-visible { display: flex; }

        /* Diálogo */
        .dialog {
            position: relative; width: 100%; background: #fffef0;
            border: 4px solid var(--ac-brown); border-radius: 28px;
            padding: 1.5rem 1rem; box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            cursor: pointer; min-height: 120px; z-index: 10;
            transition: all 5s ease;
        }
        body.upside-down .dialog {
            background: #000; border-color: var(--st-red); color: var(--st-red);
            font-family: var(--font-8bit); font-size: 0.6rem; line-height: 1.5;
            box-shadow: 0 0 20px rgba(255,0,0,0.4);
        }
        .dialog__nameplate {
            position: absolute; top: -0.85rem; left: 1.25rem; background: var(--ac-yellow);
            color: #fff; padding: 0.35rem 1rem; border-radius: 999px; font-weight: 800;
            border: 3px solid var(--ac-brown); transition: all 5s ease;
        }
        body.upside-down .dialog__nameplate { background: #600; border-color: var(--st-red); font-size: 0.5rem; }

        /* --- MINIJUEGO: EL ABECEDARIO DE JOYCE --- */
        .st-title { font-family: var(--font-8bit); color: var(--st-red); font-size: 0.8rem; text-align: center; line-height: 1.4; margin-bottom: 1rem; }
        
        .light-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px;
            border: 2px solid #333; position: relative;
        }
        .light-bulb {
            aspect-ratio: 1; border-radius: 50%; border: 2px solid #222;
            background: #111; cursor: pointer; position: relative;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-8bit); font-size: 0.6rem; color: rgba(255,255,255,0.1);
            transition: 0.2s;
        }
        .light-bulb.is-on {
            background: #ffea00; box-shadow: 0 0 20px #ffea00, inset 0 0 10px white;
            color: #000; border-color: #fff;
        }
        body.upside-down .light-bulb.is-on {
            background: #ff0000; box-shadow: 0 0 25px #ff0000;
        }

        .glitch { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 100% { transform: translate(0); } }

        .spores { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .spore { position: absolute; background: rgba(255,255,255,0.3); border-radius: 50%; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: translateY(110vh); opacity: 0; } }
    </style>
</head>

<body id="main-body">
    <div class="app">
        <header class="stats-row">
            <div class="stat-pill">BAYAS: <span id="baya-count">0</span></div>
            <div class="stat-pill">VIDAS: <span id="vida-count">3</span></div>
        </header>

        <main class="day-panels">
            <section id="day-5" class="day-panel is-active">
                <div id="phase-st-historia" class="phase is-visible">
                    <div class="scene">
                        <img id="st-char-img" src="tom.png" style="width:150px; transition: 5s;" class="character">
                        <div class="dialog" id="st-dialog-box">
                            <span class="dialog__nameplate" id="st-char-name">Tom Nook</span>
                            <p id="st-dialog-text"></p>
                            <span class="dialog__continue">▼</span>
                        </div>
                    </div>
                </div>

                <div id="phase-st-reto" class="phase">
                    <h2 class="st-title glitch">SYSTEM_OVERRIDE: CIERRA EL PORTAL</h2>
                    <p style="font-family: var(--font-8bit); font-size: 0.45rem; text-align: center; color: #666;">
                        LAS LUCES ESTÁN CONECTADAS. APÁGALAS TODAS PARA SELLAR LA BRECHA.
                    </p>
                    <div class="light-grid" id="light-grid">
                        </div>
                    <button onclick="Day5Game.resetPuzzle()" style="background:none; border:1px solid #444; color:#444; font-family:var(--font-8bit); font-size:0.5rem; padding:10px; cursor:pointer; margin-top:10px;">REINICIAR_MATRIZ</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        (function () {
            // 1. ESTADO
            const state = {
                bayas: parseInt(localStorage.getItem('ac_bayas')) || 7267,
                vidas: parseInt(localStorage.getItem('ac_vidas')) ?? 3,
                grid: [],
                gridSize: 4 // 4x4 para que sea un reto real
            };

            function save() {
                localStorage.setItem('ac_bayas', state.bayas);
                localStorage.setItem('ac_vidas', state.vidas);
                document.getElementById('baya-count').textContent = state.bayas;
                document.getElementById('vida-count').textContent = state.vidas;
            }

            function goToPhase(phase) {
                document.querySelectorAll('.phase').forEach(ph => ph.classList.remove('is-visible'));
                document.getElementById('phase-st-' + phase).classList.add('is-visible');
            }

            // 2. MOTOR DE DIÁLOGOS
            const DialogEngine = {
                steps: [], currentIdx: 0, isTyping: false, typingTimer: null, onFinish: null,
                start(config, onFinish) {
                    this.steps = config.steps; this.onFinish = onFinish; this.currentIdx = 0;
                    this.next();
                },
                next() {
                    if (this.isTyping) { this.finishInstant(); return; }
                    if (this.currentIdx >= this.steps.length) { if (this.onFinish) this.onFinish(); return; }
                    const line = this.steps[this.currentIdx];
                    document.getElementById('st-char-name').textContent = line.character || "???";
                    this.type(line.text);
                    this.currentIdx++;
                },
                type(txt) {
                    this.isTyping = true;
                    const el = document.getElementById('st-dialog-text');
                    el.textContent = ""; let i = 0;
                    const tick = () => {
                        if (i < txt.length) { el.textContent += txt[i++]; this.typingTimer = setTimeout(tick, 35); }
                        else { this.isTyping = false; }
                    }; tick();
                },
                finishInstant() {
                    clearTimeout(this.typingTimer);
                    document.getElementById('st-dialog-text').textContent = this.steps[this.currentIdx - 1].text;
                    this.isTyping = false;
                }
            };

            document.getElementById('st-dialog-box').onclick = () => DialogEngine.next();

            // 3. LÓGICA DÍA 5
            window.Day5Game = {
                init() {
                    const script = [
                        { character: "Tom Nook", text: "¡Hola! Por fin es el día 5. Qué alegría verte, sí, sí..." },
                        { character: "Tom Nook", text: "Tengo tu regalo aquí mismo, pero... ¿notas ese olor a quemado?" },
                        { character: "???", text: "R... U... N..." },
                        { character: "Tom Nook", text: "¡SOCORRO! ¡EL SUELO SE ESTÁ TRAGANDO LA TIENDA! ¡SÁLVAME!" }
                    ];

                    DialogEngine.start({ steps: script }, () => {
                        // INICIO TRANSICIÓN LENTA
                        document.body.classList.add('upside-down');
                        const img = document.getElementById('st-char-img');
                        img.classList.add('glitch');
                        img.style.filter = "invert(1) contrast(200%) brightness(0.5)";
                        this.createSpores();

                        setTimeout(() => {
                            DialogEngine.start({
                                steps: [
                                    { character: "WILL", text: "¡Ayúdame! El portal está abierto... las luces... ¡apágalas todas!" },
                                    { character: "SISTEMA", text: "ERROR CRÍTICO: BRECHA DETECTADA. INICIANDO PROTOCOLO DE SELLADO." }
                                ]
                            }, () => {
                                goToPhase('reto');
                                this.initPuzzle();
                            });
                        }, 2000);
                    });
                },

                createSpores() {
                    const container = document.createElement('div');
                    container.className = 'spores';
                    for (let i = 0; i < 40; i++) {
                        const s = document.createElement('div');
                        s.className = 'spore';
                        s.style.left = Math.random() * 100 + "vw";
                        s.style.width = s.style.height = Math.random() * 4 + 2 + "px";
                        s.style.animationDuration = Math.random() * 4 + 2 + "s";
                        s.style.animationDelay = Math.random() * 5 + "s";
                        container.appendChild(s);
                    }
                    document.body.appendChild(container);
                },

                // LÓGICA DEL PUZLE "LIGHTS OUT"
                initPuzzle() {
                    const container = document.getElementById('light-grid');
                    container.innerHTML = "";
                    state.grid = Array(state.gridSize * state.gridSize).fill(false);
                    
                    // Crear celdas
                    for (let i = 0; i < state.grid.length; i++) {
                        const bulb = document.createElement('div');
                        bulb.className = 'light-bulb';
                        bulb.textContent = String.fromCharCode(65 + i); // A, B, C...
                        bulb.onclick = () => this.toggleBulb(i);
                        container.appendChild(bulb);
                    }

                    // Mezclar el puzle (hacer 5 movimientos aleatorios para asegurar que tiene solución)
                    for (let i = 0; i < 6; i++) {
                        this.toggleBulb(Math.floor(Math.random() * state.grid.length), true);
                    }
                    this.updateView();
                },

                toggleBulb(idx, isSetup = false) {
                    const size = state.gridSize;
                    const row = Math.floor(idx / size);
                    const col = idx % size;

                    const targets = [
                        idx, // Ella misma
                        idx - size, // Arriba
                        idx + size, // Abajo
                        col > 0 ? idx - 1 : -1, // Izquierda
                        col < size - 1 ? idx + 1 : -1 // Derecha
                    ];

                    targets.forEach(t => {
                        if (t >= 0 && t < state.grid.length) {
                            state.grid[t] = !state.grid[t];
                        }
                    });

                    if (!isSetup) {
                        this.updateView();
                        this.checkWin();
                    }
                },

                updateView() {
                    const bulbs = document.querySelectorAll('.light-bulb');
                    state.grid.forEach((on, i) => {
                        bulbs[i].classList.toggle('is-on', on);
                    });
                },

                resetPuzzle() {
                    this.initPuzzle();
                },

                checkWin() {
                    if (state.grid.every(val => val === false)) {
                        // 1. Restaurar estética original
                        document.body.classList.remove('upside-down');
                        if(document.querySelector('.spores')) document.querySelector('.spores').remove();
                        const img = document.getElementById('st-char-img');
                        img.classList.remove('glitch');
                        img.style.filter = "none";
                        
                        // 2. Cambiar a fase historia para el diálogo final
                        goToPhase('historia');
                        
                        // 3. Iniciar diálogo de victoria con recompensa
                        DialogEngine.start({
                            steps: [
                                { character: "Tom Nook", text: "¡Uff! No sé qué ha pasado, pero las paredes han dejado de sangrar, sí, sí." },
                                { character: "Tom Nook", text: "Has cerrado el portal justo a tiempo. ¡Eres un auténtico héroe!" },
                                { character: "Tom Nook", text: "Aquí tienes el regalo final: ¡1.000 bayas extra y 3 vidas nuevas! ¡Te lo has ganado con creces!" }
                            ]
                        }, () => {
                            // 4. Lógica de la recompensa al terminar el diálogo
                            state.bayas += 1000;
                            state.vidas = 3;
                            save(); // Esto actualiza los números en la pantalla y guarda en localStorage
                            
                            alert("🎁 ¡HAS RECIBIDO 1000 BAYAS Y 3 VIDAS! ¡FELICIDADES POR COMPLETAR LA AVENTURA!");
                        });
                    }
                }
            };

            // Iniciar
            save();
            Day5Game.init();
        })();
    </script>
</body>

</html>
