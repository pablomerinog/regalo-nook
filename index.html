<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f8f5e4">
    <title>Isla AC — El Mercado de Nabos</title>
    <style>
        :root {
            --ac-bg: #f8f5e4;
            --ac-green: #78bc61;
            --ac-brown: #8b5a2b;
            --ac-text: #4b4b4b;
            --ac-yellow: #ffcc00;
            --sky-blue: #0c1445;
            --ac-dialog-bg: #fffef0;
            --ac-dialog-border: #6b4423;
            --ac-dialog-shadow: rgba(107, 68, 35, 0.22);
            --ac-name-shadow: rgba(0, 0, 0, 0.12);
            --ac-safe-bottom: env(safe-area-inset-bottom, 0px);
            --font-ui: ui-rounded, "Arial Rounded MT Bold", "Nunito", "Varela Round", system-ui, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; min-height: 100dvh;
            background-color: var(--ac-bg);
            background-image: radial-gradient(#e1dec9 2px, transparent 2px);
            background-size: 24px 24px;
            font-family: var(--font-ui);
            color: var(--ac-text);
            line-height: 1.5;
            display: flex; justify-content: center;
        }

        .app { width: 100%; max-width: 26rem; min-height: 100dvh; display: flex; flex-direction: column; padding: 1rem; gap: 0.75rem; }

        .stats-row { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
        .stat-pill {
            display: inline-flex; align-items: center; gap: 0.35rem;
            background: var(--ac-dialog-bg); border: 3px solid var(--ac-brown);
            border-radius: 999px; padding: 0.35rem 0.75rem; font-weight: 700;
            box-shadow: 0 3px 0 var(--ac-dialog-shadow);
        }

        .day-panel { display: flex; flex-direction: column; flex: 1; gap: 0.75rem; }
        .phase { display: none; flex-direction: column; flex: 1; gap: 0.75rem; }
        .phase.is-visible { display: flex; }

        .scene { display: flex; flex-direction: column; align-items: center; flex: 1; justify-content: flex-end; min-height: 12rem; padding-bottom: 0.25rem; }
        .character { width: min(72vw, 180px); height: auto; filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.12)); animation: acFloat 2.8s ease-in-out infinite; }
        @keyframes acFloat { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-10px) rotate(1deg); } }

        .dialog {
            position: relative; width: 100%; background: var(--ac-dialog-bg);
            border: 4px solid var(--ac-dialog-border); border-radius: 28px;
            padding: 1.35rem 1.1rem 1rem; box-shadow: 0 6px 0 var(--ac-dialog-shadow);
            cursor: pointer; min-height: 120px;
        }
        .dialog__nameplate {
            position: absolute; top: -0.85rem; left: 1.25rem; background: var(--ac-yellow);
            color: #fff; padding: 0.35rem 1rem; border-radius: 999px; font-weight: 800;
            border: 3px solid var(--ac-brown);
        }
        .dialog__continue { position: absolute; right: 1rem; bottom: 0.65rem; color: var(--ac-green); font-size: 1.25rem; font-weight: 900; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }

        .market-terminal {
            background: #2a3d1d; border: 6px double #78bc61; border-radius: 20px;
            padding: 1.2rem; color: #e8f5e9; font-family: monospace; display: flex; flex-direction: column; gap: 1rem;
        }
        .market-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #455a33; padding-bottom: 0.5rem; }
        .market-day-tag { background: #ffcc00; color: #4b4b4b; padding: 0.2rem 0.6rem; font-weight: 900; border-radius: 4px; }
        .market-value { font-size: 1.8rem; font-weight: bold; color: #78bc61; }
        .market-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .stat-box { background: rgba(0, 0, 0, 0.2); padding: 0.5rem; border-radius: 8px; text-align: center; }
        .stat-box span { font-size: 0.7rem; display: block; opacity: 0.7; }
        .market-graph { height: 60px; display: flex; align-items: flex-end; gap: 4px; background: rgba(0, 0, 0, 0.3); padding: 5px; border-radius: 4px; }
        .graph-bar { flex: 1; background: #78bc61; min-height: 2px; }
        
        .btn-market { padding: 0.8rem; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .buy { background: #4caf50; color: white; } .sell { background: #f44336; color: white; }
        .btn-market-next { background: white; color: #2a3d1d; padding: 0.6rem; border-radius: 12px; border: 3px solid #78bc61; font-weight: 900; cursor: pointer; }

        input { background: #1a2a11; border: 1px solid #78bc61; color: white; border-radius: 5px; padding: 5px; width: 60px; text-align: center; font-weight: bold; }
        
        body.market-active { background-color: #5d8233 !important; }
        .market-crash { animation: market-shake 0.2s infinite; border-color: #f44336; }
        @keyframes market-shake { 0% { transform: translate(0, 0); } 25% { transform: translate(-2px, 2px); } 50% { transform: translate(2px, -2px); } }
        .price-hot { animation: flash-gold 0.5s infinite; }
        @keyframes flash-gold { 0%, 100% { color: #78bc61; } 50% { color: #ffcc00; } }
    </style>
</head>

<body id="main-body">
    <div class="app">
        <header class="stats-row">
            <div class="stat-pill">💸 <span id="baya-count">1500</span></div>
            <div class="stat-pill">❤️ <span id="vida-count">2</span></div>
        </header>

        <main class="day-panels">
            <section id="day-3" class="day-panel">
                <div id="phase-historia" class="phase is-visible">
                    <div class="scene">
                        <img id="day3-char-img" class="character" src="tendo.png" alt="Tendo">
                        <div class="dialog" id="day3-dialog-box">
                            <span class="dialog__nameplate" id="day3-char-name">Tendo</span>
                            <p class="dialog__text" id="day3-dialog-text"></p>
                            <span class="dialog__continue">▼</span>
                        </div>
                    </div>
                </div>

                <div id="phase-reto" class="phase">
                    <p class="phase-label">Terminal de Inversión Nook</p>
                    <div id="market-ui" class="market-terminal">
                        <div class="market-header">
                            <div class="market-day-tag"><span id="market-day-name">LUNES</span></div>
                            <div class="market-price-box"><span id="market-price">100</span>💸</div>
                        </div>
                        <div class="market-stats">
                            <div class="stat-box"><span>Tus Nabos</span><strong id="player-turnips">0</strong></div>
                            <div class="stat-box"><span>Tu Saldo</span><strong id="market-wealth">0</strong></div>
                        </div>
                        <div class="market-graph" id="market-history"></div>
                        <div style="background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; text-align: center;">
                            <span style="font-size: 0.7rem; color: #78bc61; display: block; margin-bottom: 5px;">CANTIDAD A COMPRAR:</span>
                            <div style="display: flex; justify-content: center; gap: 8px;">
                                <input type="number" id="buy-amount" value="0" min="0">
                                <button class="btn-market buy" id="btn-buy-max" style="padding: 5px 10px;">MÁX</button>
                            </div>
                            <button class="btn-market buy" id="btn-buy-action" style="width: 100%; margin-top: 8px;">CONFIRMAR COMPRA</button>
                        </div>
                        <button class="btn-market sell" id="btn-sell-all">VENDER TODO EL INVENTARIO</button>
                        <button class="btn-market-next" id="btn-next-day">SIGUIENTE DÍA →</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        (function () {
            const STORAGE_BAYAS = 'ac_bayas';
            const STORAGE_VIDAS = 'ac_vidas';
            
            const state = {
                bayas: parseInt(localStorage.getItem(STORAGE_BAYAS)) || 3000,
                vidas: localStorage.getItem(STORAGE_VIDAS) !== null ? parseInt(localStorage.getItem(STORAGE_VIDAS)) : 3,
                inventory: 0,
                startWealth: 0,
                currentDayIdx: 0,
                price: 100,
                history: [],
                trend: 'random'
            };

            function save() {
                localStorage.setItem(STORAGE_BAYAS, state.bayas);
                localStorage.setItem(STORAGE_VIDAS, state.vidas);
                document.getElementById('baya-count').textContent = state.bayas;
                document.getElementById('vida-count').textContent = state.vidas;
            }

            function goToPhase(phase) {
                document.querySelectorAll('.phase').forEach(ph => ph.classList.remove('is-visible'));
                document.getElementById('phase-' + phase).classList.add('is-visible');
            }

            const DialogEngine = {
                steps: [],
                currentIdx: 0,
                isTyping: false,
                typingTimer: null,
                onFinish: null,

                start(config, onFinish) {
                    this.steps = config.steps;
                    this.onFinish = onFinish;
                    this.currentIdx = 0;
                    document.getElementById('day3-char-name').textContent = config.character;
                    document.getElementById('day3-char-img').src = config.character.toLowerCase() + ".png";
                    this.next();
                },

                next() {
                    if (this.isTyping) {
                        this.finishInstant();
                        return;
                    }
                    if (this.currentIdx >= this.steps.length) {
                        if (this.onFinish) this.onFinish();
                        return;
                    }
                    this.type(this.steps[this.currentIdx].text);
                    this.currentIdx++;
                },

                type(txt) {
                    this.isTyping = true;
                    const el = document.getElementById('day3-dialog-text');
                    el.textContent = "";
                    let i = 0;
                    const tick = () => {
                        if (i < txt.length) {
                            el.textContent += txt[i++];
                            this.typingTimer = setTimeout(tick, 25);
                        } else {
                            this.isTyping = false;
                        }
                    };
                    tick();
                },

                finishInstant() {
                    if (this.currentIdx === 0) return;
                    clearTimeout(this.typingTimer);
                    document.getElementById('day3-dialog-text').textContent = this.steps[this.currentIdx - 1].text;
                    this.isTyping = false;
                }
            };

            document.getElementById('day3-dialog-box').onclick = () => DialogEngine.next();

            const Day3Game = {
                days: ['LUNES', 'MARTES', 'MIÉRCOLES', 'JUEVES', 'VIERNES', 'SÁBADO'],

                init() {
                    document.body.classList.add('market-active');
                    state.currentDayIdx = 0;
                    state.inventory = 0;
                    state.startWealth = state.bayas;
                    state.price = 90 + Math.floor(Math.random() * 30);
                    state.history = [state.price];
                    state.trend = ['spike', 'decreasing', 'fluctuating'][Math.floor(Math.random() * 3)];
                    this.updateUI();
                    goToPhase('reto');
                },

                updateUI() {
                    document.getElementById('market-day-name').textContent = this.days[state.currentDayIdx];
                    const priceEl = document.getElementById('market-price');
                    priceEl.textContent = state.price;
                    document.getElementById('player-turnips').textContent = state.inventory;
                    document.getElementById('market-wealth').textContent = state.bayas;

                    document.getElementById('market-ui').classList.toggle('market-crash', state.price < 50);
                    priceEl.classList.toggle('price-hot', state.price > 250);

                    const graph = document.getElementById('market-history');
                    graph.innerHTML = "";
                    state.history.forEach(p => {
                        const bar = document.createElement('div');
                        bar.className = 'graph-bar';
                        bar.style.height = Math.min(100, (p / 6)) + "%";
                        graph.appendChild(bar);
                    });
                },

                buy(qty) {
                    const cost = qty * state.price;
                    if (qty > 0 && state.bayas >= cost) {
                        state.bayas -= cost;
                        state.inventory += qty;
                        save();
                        this.updateUI();
                    } else if (qty > 0) {
                        alert("Tendo: ¡No tienes bayas suficientes!... ¡suficientes!");
                    }
                },

                sell() {
                    if (state.inventory > 0) {
                        state.bayas += state.inventory * state.price;
                        state.inventory = 0;
                        save();
                        this.updateUI();
                    }
                },

                nextDay() {
                    if (state.currentDayIdx < 5) {
                        state.currentDayIdx++;
                        if (state.trend === 'decreasing') state.price -= Math.floor(Math.random() * 12) + 2;
                        else if (state.trend === 'spike' && state.currentDayIdx >= 3) state.price += 120 + Math.floor(Math.random() * 80);
                        else state.price = 40 + Math.floor(Math.random() * 220);
                        
                        if (state.price < 10) state.price = 10;
                        state.history.push(state.price);
                        this.updateUI();
                    } else {
                        this.finish();
                    }
                },

                finish() {
                    document.body.classList.remove('market-active');
                    if (state.inventory > 0) {
                        alert("🦟 ¡Moscas! Tus nabos se han podrido.");
                        state.inventory = 0;
                    }
                    const profit = state.bayas - state.startWealth;
                    if (profit >= 2500) {
                        goToPhase('historia');
                        DialogEngine.start({
                            character: 'Tendo',
                            steps: [
                                { text: "¡Increíble, sí, sí! Eres todo un magnate de los nabos." },
                                { text: "Has conseguido un beneficio de " + profit + " bayas." },
                                { text: "La caja se ha abierto. ¡Aquí tienes tu paquete! Vuelve mañana... ¡mañana!" }
                            ]
                        }, null);
                    } else {
                        state.vidas = Math.max(0, state.vidas - 1);
                        save();
                        if (state.vidas > 0) {
                            alert("No llegaste al objetivo (+2500). Beneficio: " + profit + ". Pierdes un ❤️ y reintentamos.");
                            this.init();
                        } else {
                            goToPhase('historia');
                            DialogEngine.start({
                                character: 'Nendo',
                                steps: [
                                    { text: "¡Oh, no! Te has quedado sin corazones... ¡corazones!" },
                                    { text: "El mercado ha cerrado por hoy. Vuelve mañana a intentarlo de nuevo. ¡Zzz...!" }
                                ]
                            }, null);
                        }
                    }
                }
            };

            document.getElementById('btn-buy-max').onclick = () => {
                document.getElementById('buy-amount').value = Math.floor(state.bayas / state.price);
            };
            document.getElementById('btn-buy-action').onclick = () => {
                Day3Game.buy(parseInt(document.getElementById('buy-amount').value) || 0);
            };
            document.getElementById('btn-sell-all').onclick = () => Day3Game.sell();
            document.getElementById('btn-next-day').onclick = () => Day3Game.nextDay();

            save();
            DialogEngine.start({
                character: 'Tendo',
                steps: [
                    { text: '¡Hola, hola! Bienvenido al rincón del inversor... ¡inversor!' },
                    { text: 'Para recuperar tu paquete, debes ganar al menos 2.500 bayas netas en el mercado de nabos.' },
                    { text: 'Usaremos tus bayas reales. Tienes 6 días para especular.' },
                    { text: '¡Si llega el sábado y no has vendido, se pudrirán... ¡pudrirán!' }
                ]
            }, () => Day3Game.init());

        })();
    </script>
</body>
</html>
