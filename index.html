<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Isla AC — El Museo Corrupto</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --ac-bg: #f8f5e4;
            --ac-brown: #8b5a2b;
            --ac-yellow: #ffcc00;
            --st-red: #ff0000;
            --st-dark: #0a0a0a;
            --font-8bit: 'Press Start 2P', cursive;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0; min-height: 100dvh;
            background-color: var(--ac-bg);
            background-image: radial-gradient(#e1dec9 2px, transparent 2px);
            background-size: 24px 24px;
            font-family: ui-rounded, sans-serif;
            color: #4b4b4b;
            display: flex; justify-content: center;
            transition: background 5s ease, color 5s ease;
            overflow-x: hidden;
        }

        .app { width: 100%; max-width: 26rem; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; position: relative; }

        .stats-row { display: flex; justify-content: space-between; z-index: 10; }
        .stat-pill {
            background: #fffef0; border: 3px solid var(--ac-brown);
            border-radius: 999px; padding: 0.5rem 1rem; font-weight: 800;
            box-shadow: 0 3px 0 rgba(0, 0, 0, 0.1);
        }

        .day-panel { display: none; flex-direction: column; flex: 1; gap: 1rem; }
        .day-panel.is-active { display: flex; }
        .phase { display: none; flex-direction: column; flex: 1; gap: 1rem; }
        .phase.is-visible { display: flex; }

        .scene { display: flex; flex-direction: column; align-items: center; flex: 1; justify-content: flex-end; min-height: 12rem; padding-bottom: 0.25rem; }
        .character { width: min(72vw, 150px); filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.12)); animation: acFloat 2.8s ease-in-out infinite; }
        @keyframes acFloat { 0%, 100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-10px) rotate(1deg); } }

        .dialog {
            position: relative; width: 100%; background: #fffef0;
            border: 4px solid var(--ac-brown); border-radius: 28px;
            padding: 1.5rem 1rem; box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1);
            cursor: pointer; min-height: 120px; z-index: 10;
        }
        .dialog__nameplate {
            position: absolute; top: -0.85rem; left: 1.25rem; background: var(--ac-yellow);
            color: #fff; padding: 0.35rem 1rem; border-radius: 999px; font-weight: 800;
            border: 3px solid var(--ac-brown);
        }
        .dialog__continue { position: absolute; right: 1rem; bottom: 0.65rem; color: var(--ac-green); font-size: 1.25rem; font-weight: 900; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(5px); } }

        /* --- DÍA 6: MUSEO UPSIDE DOWN --- */
        .museum-frame {
            background: #1a0a0a; padding: 15px; border: 6px double #600;
            border-radius: 10px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
        .puzzle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #000; padding: 10px; }
        
        .puzzle-piece {
            aspect-ratio: 1; background: #222; border: 2px solid #400;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; color: var(--st-red);
            text-shadow: 0 0 10px var(--st-red);
            box-shadow: inset 0 0 10px rgba(255,0,0,0.1);
            transition: 0.2s;
        }
        .puzzle-piece:hover { border-color: var(--st-red); background: #300; }
        .puzzle-piece.empty { background: transparent; border: none; box-shadow: none; }

        .glitch-text { font-family: var(--font-8bit); font-size: 0.5rem; color: var(--st-red); text-align: center; animation: glitch 2s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 2px); }
            2% { transform: translate(2px, -2px); }
            3% { transform: translate(0); }
        }

        /* --- GUÍA DEL PUZLE CON CUENTA ATRÁS --- */
        .puzzle-guide-container {
            margin-top: 15px; padding: 10px; background: rgba(0, 0, 0, 0.3);
            border: 1px dashed #600; border-radius: 10px;
            transition: opacity 0.5s ease;
        }
        .puzzle-guide-container.hidden { opacity: 0; pointer-events: none; }
        
        .timer-badge {
            font-family: var(--font-8bit); font-size: 0.45rem; color: #ffcc00;
            text-align: center; margin-bottom: 8px; display: block;
        }
        .timer-badge span { color: #ff0000; font-size: 0.6rem; }

        .puzzle-guide-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .guide-item {
            background: #1a0000; border: 1px solid #400; font-size: 0.8rem;
            display: flex; flex-direction: column; align-items: center; padding: 5px; border-radius: 4px;
        }
        .guide-num { font-size: 0.4rem; color: #666; font-family: var(--font-8bit); margin-bottom: 2px; }
    </style>
</head>

<body id="main-body">
    <div class="app">
        <header class="stats-row">
            <div class="stat-pill">💸 <span id="baya-count">7000</span></div>
            <div class="stat-pill">❤️ <span id="vida-count">2</span></div>
        </header>

        <main class="day-panels">
            <section id="day-6" class="day-panel">
                <div id="phase-day6-historia" class="phase is-visible">
                    <div class="scene">
                        <img id="day6-char-img" class="character" src="socrates.png">
                        <div class="dialog" onclick="DialogEngine.next()">
                            <span class="dialog__nameplate" id="day6-char-name">Sócrates</span>
                            <p id="day6-dialog-text"></p>
                            <span class="dialog__continue">▼</span>
                        </div>
                    </div>
                </div>
                <div id="phase-day6-reto" class="phase">
                    <p class="glitch-text">DATA_FRAGMENT_RECONSTRUCTION</p>
                    <div class="museum-frame">
                        <div class="puzzle-grid" id="puzzle-grid"></div>
                    </div>

                    <div class="puzzle-guide-container" id="guide-box">
                        <span class="timer-badge">EL BOCETO SE BORRA EN: <span id="guide-timer">30</span>s</span>
                        <div class="puzzle-guide-grid">
                            <div class="guide-item"><span class="guide-num">1</span>🔦</div>
                            <div class="guide-item"><span class="guide-num">2</span>🚲</div>
                            <div class="guide-item"><span class="guide-num">3</span>📻</div>
                            <div class="guide-item"><span class="guide-num">4</span>🌲</div>
                            <div class="guide-item"><span class="guide-num">5</span>🩸</div>
                            <div class="guide-item"><span class="guide-num">6</span>🧇</div>
                            <div class="guide-item"><span class="guide-num">7</span>🦇</div>
                            <div class="guide-item"><span class="guide-num">8</span>👁️</div>
                        </div>
                    </div>

                    <p id="hint-text" style="font-size: 0.45rem; text-align: center; font-family: var(--font-8bit); color: #600; margin-top: 10px;">
                        MUEVE LAS PIEZAS HASTA QUE COINCIDAN CON EL BOCETO.
                    </p>
                </div>
            </section>
        </main>
    </div>

    <script>
        (function () {
            const state = {
                bayas: parseInt(localStorage.getItem('ac_bayas')) || 3000,
                vidas: parseInt(localStorage.getItem('ac_vidas')) || 3,
                puzzle: [],
                emptyIdx: 8,
                day6Complete: localStorage.getItem('ac_day6_complete') === 'true',
                timerInterval: null,
                icons: {
                    1: "🔦", 2: "🚲", 3: "📻", 4: "🌲", 5: "🩸", 6: "🧇", 7: "🦇", 8: "👁️"
                }
            };

            function save() {
                localStorage.setItem('ac_bayas', state.bayas);
                localStorage.setItem('ac_vidas', state.vidas);
                localStorage.setItem('ac_day6_complete', state.day6Complete);
                document.getElementById('baya-count').textContent = state.bayas;
                document.getElementById('vida-count').textContent = state.vidas;
            }

            function goToPhase(day, phase) {
                document.querySelectorAll('.phase').forEach(ph => ph.classList.remove('is-visible'));
                const el = document.getElementById(`phase-${day}-${phase}`);
                if(el) el.classList.add('is-visible');
            }

            const DialogEngine = {
                steps: [], currentIdx: 0, isTyping: false, typingTimer: null, onFinish: null, textEl: null,
                start(config, textElId, onFinish) {
                    this.steps = config.steps; this.onFinish = onFinish; this.currentIdx = 0;
                    this.textEl = document.getElementById(textElId);
                    this.next();
                },
                next() {
                    if (this.isTyping) { this.finishInstant(); return; }
                    if (this.currentIdx >= this.steps.length) { if (this.onFinish) this.onFinish(); return; }
                    this.type(this.steps[this.currentIdx].text);
                    this.currentIdx++;
                },
                type(txt) {
                    this.isTyping = true; this.textEl.textContent = ""; let i = 0;
                    const tick = () => {
                        if (i < txt.length) { this.textEl.textContent += txt[i++]; this.typingTimer = setTimeout(tick, 30); }
                        else { this.isTyping = false; }
                    }; tick();
                },
                finishInstant() {
                    if (this.currentIdx > 0) {
                        clearTimeout(this.typingTimer);
                        this.textEl.textContent = this.steps[this.currentIdx - 1].text;
                        this.isTyping = false;
                    }
                }
            };

            const Day6Game = {
                init() {
                    document.getElementById('day-6').classList.add('is-active');
                    if(state.day6Complete) {
                        DialogEngine.start({ steps: [
                            { text: "¡Uuuh! Gracias de nuevo por tu ayuda." },
                            { text: "El museo ya está cerrado por hoy. Ve a descansar, mañana te espera la gran sorpresa final... ¡uuuh!" }
                        ]}, 'day6-dialog-text');
                        return;
                    }
                    DialogEngine.start({ steps: [
                        { text: "¡Uuuh! Qué alegría verte... aunque las circunstancias sean algo... inquietantes." },
                        { text: "Tras lo ocurrido ayer con el portal, este cuadro ha quedado infectado por una energía roja." },
                        { text: "He encontrado un boceto original, pero la energía lo está borrando. ¡Memorízalo rápido!" },
                        { text: "¿Me ayudas a ordenarlos antes de que pierdas la imagen de tu cabeza? Te recompensaré bien." }
                    ]}, 'day6-dialog-text', () => {
                        goToPhase('day6', 'reto'); 
                        this.build();
                        this.startTimer();
                    });
                },

                startTimer() {
                    let timeLeft = 30;
                    const timerEl = document.getElementById('guide-timer');
                    const guideBox = document.getElementById('guide-box');
                    const hintText = document.getElementById('hint-text');

                    state.timerInterval = setInterval(() => {
                        timeLeft--;
                        timerEl.textContent = timeLeft;
                        if(timeLeft <= 0) {
                            clearInterval(state.timerInterval);
                            guideBox.classList.add('hidden'); // Ocultar boceto
                            hintText.textContent = "¡EL BOCETO SE HA BORRADO! CONFÍA EN TU MEMORIA.";
                            hintText.style.color = "#ff0000";
                        }
                    }, 1000);
                },

                build() {
                    let p = [1,2,3,4,5,6,7,8,null]; state.emptyIdx = 8;
                    for(let i=0; i<40; i++) {
                        const adj = this.getAdj(state.emptyIdx);
                        const move = adj[Math.floor(Math.random()*adj.length)];
                        [p[state.emptyIdx], p[move]] = [p[move], p[state.emptyIdx]];
                        state.emptyIdx = move;
                    }
                    state.puzzle = p; this.draw();
                },
                getAdj(i) {
                    const a = []; const r = Math.floor(i/3); const c = i%3;
                    if(r>0) a.push(i-3); if(r<2) a.push(i+3); if(c>0) a.push(i-1); if(c<2) a.push(i+1);
                    return a;
                },
                draw() {
                    const g = document.getElementById('puzzle-grid'); g.innerHTML = "";
                    state.puzzle.forEach((v, i) => {
                        const d = document.createElement('div');
                        d.className = `puzzle-piece ${v===null?'empty':''}`;
                        d.textContent = v ? state.icons[v] : "";
                        d.onclick = () => this.click(i);
                        g.appendChild(d);
                    });
                },
                click(i) {
                    if(this.getAdj(i).includes(state.emptyIdx)) {
                        [state.puzzle[state.emptyIdx], state.puzzle[i]] = [state.puzzle[i], state.puzzle[state.emptyIdx]];
                        state.emptyIdx = i; this.draw(); this.check();
                    }
                },
                check() {
                    if(state.puzzle.slice(0,8).every((v,i)=>v===i+1)) {
                        if(state.day6Complete) return;
                        
                        clearInterval(state.timerInterval); // Parar el tiempo si gana antes
                        state.day6Complete = true; 
                        state.bayas += 1500;
                        save();

                        setTimeout(() => {
                            goToPhase('day6', 'historia');
                            DialogEngine.start({ steps: [
                                { text: "¡Espléndido! Has recordado el orden perfectamente a pesar de la interferencia." },
                                { text: "Toma estas 1.500 bayas. ¡Te las has ganado con creces!" },
                                { text: "Mañana será el último día de esta aventura. Ve a descansar y prepárate para la gran sorpresa." },
                                { text: "¡Hasta mañana, uuuh!" }
                            ]}, 'day6-dialog-text');
                        }, 500);
                    }
                }
            };

            window.DialogEngine = DialogEngine;
            window.Day6Game = Day6Game;
            window.state = state;

            save();
            Day6Game.init();

            window.winDay6 = () => {
                state.puzzle = [1,2,3,4,5,6,7,null,8];
                state.emptyIdx = 7;
                Day6Game.draw();
                Day6Game.check();
            };
        })();
    </script>
</body>
</html>
